name: obiente-translate-dev

services:
  gowhisper:
    image: obiente-translate-gowhisper:dev
    build:
      context: ./gowhisper
      args:
        WHISPER_CPP_REF: ${WHISPER_CPP_REF:-master}
        DOWNLOAD_MODEL: ${DOWNLOAD_MODEL:-0}
        MODEL_NAME: ${MODEL_NAME:-base}
    ports:
      - "${WHISPER_GO_PORT:-8080}:8080"
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./gowhisper/models:/models
    environment:
      WHISPER_GO_ADDR: ":8080"
      WHISPER_MODEL_NAME: "${MODEL_NAME:-base}"
      WHISPER_MODEL_DOWNLOAD: "${WHISPER_MODEL_DOWNLOAD:-auto}"
      WHISPER_MODEL_PATH: "/models/ggml-${MODEL_NAME:-base}.bin"
      WHISPER_ENGINE_POOL_SIZE: "${WHISPER_ENGINE_POOL_SIZE:-2}"
      WHISPER_THREADS: "${WHISPER_THREADS:-4}"
      WHISPER_LIVE_WINDOW_MS: "${WHISPER_LIVE_WINDOW_MS:-1000}"
      WHISPER_MAX_WINDOW_MS: "${WHISPER_MAX_WINDOW_MS:-4000}"
      WHISPER_REALTIME_MAX_LAG_MS: "${WHISPER_REALTIME_MAX_LAG_MS:-8000}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      TRANSLATION_BASE_URL: "${TRANSLATION_BASE_URL:-https://libretranslate.obiente.cloud}"
      WHISPER_SERVER_TRANSLATIONS: "${WHISPER_SERVER_TRANSLATIONS:-true}"
      TRANSLATION_TIMEOUT: "${TRANSLATION_TIMEOUT:-8}"
